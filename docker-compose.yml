services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: iep_auth
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpw"]
      interval: 5s
      timeout: 3s
      retries: 30

  mongo:
    image: mongo:6
    command: mongod --quiet --logpath /dev/null 

    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  ganache:
    image: trufflesuite/ganache-cli:latest
    command:
      - --host=0.0.0.0
      - --port=8545
      - --gasLimit=10000000
      - --accounts=10
      - --defaultBalanceEther=1000
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const r=http.request({hostname:'localhost',port:8545,method:'POST',headers:{'Content-Type':'application/json'}},res=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.write(JSON.stringify({jsonrpc:'2.0',method:'eth_blockNumber',params:[],id:1}));r.end()\""]
      interval: 5s
      timeout: 3s
      retries: 30

  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://root:rootpw@mysql:3306/iep_auth?charset=utf8mb4
      JWT_SECRET_KEY: JWT_SECRET_DEV_KEY
      ROLES_FIELD: roles
      DIRECTOR_ROLE: director
      EMPLOYEE_ROLE: employee
    ports:
      - "5000:5000"
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy

  employee:
    build:
      context: .
      dockerfile: employee/Dockerfile
    environment:
      MONGO_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: JWT_SECRET_DEV_KEY
      ROLES_FIELD: roles
      EMPLOYEE_ROLE: employee
      DIRECTOR_ROLE: director
    ports:
      - "5001:5001"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  director:
    build:
      context: .
      dockerfile: director/Dockerfile
    environment:
      MONGO_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/0
      GANACHE_URL: http://ganache:8545
      JWT_SECRET_KEY: JWT_SECRET_DEV_KEY
      ROLES_FIELD: roles
      DIRECTOR_ROLE: director
      EMPLOYEE_ROLE: employee
    ports:
      - "5002:5002"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      ganache:
        condition: service_healthy

volumes:
  mysql_data:
  mongo_data: