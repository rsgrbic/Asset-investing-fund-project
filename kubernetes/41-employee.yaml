apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee
  namespace: iep
spec:
  replicas: 3
  selector:
    matchLabels:
      app: employee
  template:
    metadata:
      labels:
        app: employee
    spec:
      containers:
        - name: employee
          image: iep-employee:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: iep-config
            - secretRef:
                name: iep-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: employee
  namespace: iep
spec:
  type: LoadBalancer
  selector:
    app: employee
  ports:
    - port: 5001
      targetPort: 5001
