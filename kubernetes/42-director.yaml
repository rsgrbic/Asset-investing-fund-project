apiVersion: apps/v1
kind: Deployment
metadata:
  name: director
  namespace: iep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: director
  template:
    metadata:
      labels:
        app: director
    spec:
      containers:
        - name: director
          image: iep-director:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: iep-config
            - secretRef:
                name: iep-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: director
  namespace: iep
spec:
  type: LoadBalancer
  selector:
    app: director
  ports:
    - port: 5002
      targetPort: 5002