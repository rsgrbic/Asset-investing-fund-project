apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: iep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: iep-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: iep-config
            - secretRef:
                name: iep-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: iep
spec:
  type: LoadBalancer
  selector:
    app: auth
  ports:
    - port: 5000
      targetPort: 5000
